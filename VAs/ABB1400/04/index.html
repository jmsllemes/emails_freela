<!DOCTYPE html>
<html lang="pt">

<head>
	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
	<meta name="viewport" content="width=device-width, user-scalable=yes" />
	<link href="../shared/shared.css" rel="stylesheet" type="text/css" />
	<link href="css/style.css" rel="stylesheet" type="text/css" />
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
	<script>
		if (window.navigator.userAgent.includes('iPad')) {
			document.write('<script src="veeva-library-4.1.js"><\/script>');
		}
	</script>
	<script src="../shared/shared.js"></script>
	<title>Caso clínico Dr Lucas Pedri | Rinvoq AR-p1</title>
</head>


<body>
	<div class="main" id="content">
		<section id="screen">
			<a href="javascript:void(0)" data-slide="next" class="btn btn-next"></a>
			<a href="javascript:void(0)" data-slide="prev" class="btn btn-prev"></a>
			<a href="javascript:void(0)" data-slide="01" class="btn-home btn"></a>
			<a href="javascript:void(0)" data-slide="06" class="btn-bula btn"></a>
			<a href="javascript:void(0)" data-slide="02" class="btn-menu-1 btn"></a>
			<a href="javascript:void(0)" data-slide="03" class="btn-menu-2 btn"></a>
			<a href="javascript:void(0)" data-slide="04" class="btn-menu-3 btn"></a>
			<a href="javascript:void(0)" data-slide="05" class="btn-menu-4 btn"></a>

			<a href="javascript:void(0)" class="btn-open-popup btn"></a>
		</section>

		<div id="popup1" class="popup-container">
			<a href="javascript:void(0)" class="btn-close-popup"></a>
		</div>
	</div>

	<script>
		$(document).ready(function () {
			const $popup = $("#popup1");

			$(".btn-open-popup").on("click", function (e) {
				e.preventDefault();
				console.log("Abrindo popup...");
				$popup.stop(true, true).fadeIn(400);
			});

			// 3. Evento para fechar
			$(".btn-close-popup").on("click", function (e) {
				e.preventDefault();
				console.log("Fechando popup...");
				$popup.stop(true, true).fadeOut(400);
			});
		});
	</script>
</body>

</html>
