<!DOCTYPE html>
<html lang="pt">

<head>
	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
	<meta name="viewport" content="width=device-width, user-scalable=yes" />
	<link href="css/shared.css" rel="stylesheet" type="text/css" />
	<link href="css/style.css" rel="stylesheet" type="text/css" />
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
	<script>
		if (window.navigator.userAgent.includes('iPad')) {
			document.write('<script src="veeva-library-4.1.js"><\/script>');
		}
	</script>
	<script src="js/shared.js"></script>
	<title>ABB1205_CLM Gastro RINVOQ</title>
</head>

<body>
	<div class="main" id="content">
		<section id="screen">
			<!-- Botões navegação -->
			<a href="javascript:void(0)" data-slide="next" class="btn btn-next-veeva"></a>

			<!-- Botões Menus e Bula -->
			<a href="javascript:void(0)" data-slide="22" class="btn-bula btn"></a>
			<a href="javascript:void(0)" data-slide="01" class="btn-home btn btn-menu"></a>
			<a href="javascript:void(0)" data-slide="02" class="btn-01 btn btn-menu"></a>
			<a href="javascript:void(0)" data-slide="05" class="btn-02 btn btn-menu"></a>
			<a href="javascript:void(0)" data-slide="11" class="btn-03 btn btn-menu"></a>
			<a href="javascript:void(0)" data-slide="12" class="btn-04 btn btn-menu"></a>
			<a href="javascript:void(0)" data-slide="13" class="btn-05 btn btn-menu"></a>
			<a href="javascript:void(0)" data-slide="18" class="btn-06 btn btn-menu"></a>

			<!-- Demais botões de navegação -->
			<a href="javascript:void(0)" data-slide="05" class="btn-jump-01 btn btn-jump"></a>
			<a href="javascript:void(0)" data-slide="11" class="btn-jump-02 btn btn-jump"></a>
			<a href="javascript:void(0)" data-slide="13" class="btn-jump-03 btn btn-jump"></a>
			<a href="javascript:void(0)" data-slide="17" class="btn-jump-04 btn btn-jump"></a>

			<!-- Botões Popups e Ref -->
			<a href="javascript:void(0)" class="btn-open-popup-ref btn btn-open" data-open="popup1"></a>

			<div id="popup1" class="popup-container-ref popup-container">
				<a href="javascript:void(0)" class="btn-close-popup-ref btn-close"></a>
			</div>
		</section>
	</div>

	<script>
		$(document).ready(function () {

			// FUNÇÃO UNIVERSAL PARA ABRIR (Mantém igual)
			$(".btn-open").on("click", function (e) {
				e.preventDefault();
				var targetPopup = "#" + $(this).attr("data-open");
				$(targetPopup).stop(true, true).fadeIn(400);
			});

			// FUNÇÃO UNIVERSAL PARA FECHAR (Melhorada)
			$(".btn-close").on("click", function (e) {
				e.preventDefault();

				// Verificamos se o botão tem o atributo data-close
				var specificTargets = $(this).attr("data-close");

				if (specificTargets) {
					// Se tiver, fecha os alvos específicos (ex: "#popup8, #popup7")
					$(specificTargets).stop(true, true).fadeOut(400);
				} else {
					// Se não tiver, fecha apenas o popup atual onde o botão está
					$(this).closest(".popup-container").stop(true, true).fadeOut(400);
				}
			});

			// Botão para fechar TUDO e voltar para a screen principal
			$(".btn-close-all").on("click", function () {
				$(".popup-container").fadeOut(400);
			});

		});
	</script>
</body>

</html>
