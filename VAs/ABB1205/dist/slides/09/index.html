<!DOCTYPE html>
<html lang="pt">

<head>
	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
	<meta name="viewport" content="width=device-width, user-scalable=yes" />
	<link href="css/shared.css" rel="stylesheet" type="text/css" />
	<link href="css/style.css" rel="stylesheet" type="text/css" />
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
	<script>
		if (window.navigator.userAgent.includes('iPad')) {
			document.write('<script src="veeva-library-4.1.js"><\/script>');
		}
	</script>
	<script src="js/shared.js"></script>
	<title>ABB1205_CLM Gastro RINVOQ</title>
</head>

<body>
	<div class="main" id="content">
		<section id="screen">

			<!-- Botões navegação -->
			<a href="javascript:void(0)" data-slide="prev" class="btn btn-prev-veeva"></a>
			<a href="javascript:void(0)" data-slide="next" class="btn btn-next-veeva"></a>

			<a href="javascript:void(0)" data-slide="next" class="btn btn-next-veeva-2"></a>

			<!-- Botões Menus e Bula -->
			<a href="javascript:void(0)" data-slide="22" class="btn-bula btn"></a>
			<a href="javascript:void(0)" data-slide="01" class="btn-home btn btn-menu"></a>
			<a href="javascript:void(0)" data-slide="02" class="btn-01 btn btn-menu"></a>
			<a href="javascript:void(0)" data-slide="05" class="btn-02 btn btn-menu"></a>
			<a href="javascript:void(0)" data-slide="11" class="btn-03 btn btn-menu"></a>
			<a href="javascript:void(0)" data-slide="12" class="btn-04 btn btn-menu"></a>
			<a href="javascript:void(0)" data-slide="13" class="btn-05 btn btn-menu"></a>
			<a href="javascript:void(0)" data-slide="18" class="btn-06 btn btn-menu"></a>

			<!-- Botões Popups e Ref na tela principal -->
			<a href="javascript:void(0)" class="btn-open-popup-ref btn btn-open" data-open="popup1"></a>

			<!-- POPUP 1 (Referências) -->
			<div id="popup1" class="popup-container">
				<a href="javascript:void(0)" class="btn-close-all btn-close"></a>
			</div>
		</section>
	</div>

	<script>
		$(document).ready(function () {

			$(".btn-open").on("click", function (e) {
				e.preventDefault();
				var targetToOpen = "#" + $(this).attr("data-open");
				var targetToHide = "#" + $(this).attr("data-hide");

				if ($(this).attr("data-hide")) {
					// Removemos o 'callback'. Agora ele esconde um e mostra o outro ATÉ O MESMO TEMPO.
					// Usamos .hide() e .show() para ser instantâneo, ou fadeOut(100) para ser muito rápido.
					$(targetToHide).hide();
					$(targetToOpen).show();
				} else {
					// Abertura inicial vindo da tela principal
					$(targetToOpen).stop(true, true).fadeIn(200);
				}
			});

			// Fechar tudo também deve ser rápido
			$(".btn-close-all").on("click", function (e) {
				e.preventDefault();
				$(".popup-container").hide(); // .hide() é mais rápido que .fadeOut()
			});

		});
	</script>
</body>

</html>
