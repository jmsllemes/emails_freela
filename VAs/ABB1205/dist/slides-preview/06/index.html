	<script>
		$(document).ready(function () {

			$(".btn-open").on("click", function (e) {
				e.preventDefault();
				var targetToOpen = "#" + $(this).attr("data-open");
				var targetToHide = "#" + $(this).attr("data-hide");

				if ($(this).attr("data-hide")) {
					// Removemos o 'callback'. Agora ele esconde um e mostra o outro ATÉ O MESMO TEMPO.
					// Usamos .hide() e .show() para ser instantâneo, ou fadeOut(100) para ser muito rápido.
					$(targetToHide).hide();
					$(targetToOpen).show();
				} else {
					// Abertura inicial vindo da tela principal
					$(targetToOpen).stop(true, true).fadeIn(200);
				}
			});

			// Fechar tudo também deve ser rápido
			$(".btn-close-all").on("click", function (e) {
				e.preventDefault();
				$(".popup-container").hide(); // .hide() é mais rápido que .fadeOut()
			});

		});
	</script>
